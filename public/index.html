<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PANDAFORGE BROWSER — 2026 DOMINATION</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
    body { margin:0; background:#0a0a0a; color:#00ff9f; font-family:'Press Start 2P', system-ui; overflow:hidden; }
    .neon { text-shadow: 0 0 10px #ff00aa, 0 0 20px #00ffff; }
    .container { height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; }
    .panda { font-size:120px; animation: roar 2s infinite alternate; }
    .title { font-size:48px; margin:20px 0; }
    .subtitle { font-size:18px; color:#ff00aa; }
    .btn { padding:20px 60px; background:transparent; border:4px solid #00ffff; color:#00ffff; font-size:20px; cursor:pointer; margin-top:40px; transition:all 0.3s; }
    .btn:hover { background:#00ffff; color:#000; box-shadow:0 0 40px #00ffff; }
    .chains { position:absolute; font-size:40px; animation: swing 3s infinite; }
    .fog { position:absolute; width:100%; height:100%; background:radial-gradient(circle, rgba(0,255,170,0.1) 0%, transparent 70%); pointer-events:none; }
    @keyframes roar { from { transform:scale(1); } to { transform:scale(1.1); } }
    @keyframes swing { 0%,100% { transform:rotate(-15deg); } 50% { transform:rotate(15deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="fog"></div>
    <div class="chains">⛓️⛓️⛓️</div>
    <div class="panda">🐼💀</div>
    <h1 class="title neon">PANDAFORGE BROWSER</h1>
    <p class="subtitle">GORE-NEON • AI ORACLE • 2026 DOMINATION</p>
    <button class="btn" onclick="launch()">VERCEL --PROD DEPLOYED • CLICK TO ACTIVATE</button>
    <p style="margin-top:60px; font-size:12px; opacity:0.6;">SHA: bd8f111 • PHASE 2 ENHANCED • LAUNCH VELOCITY: MAX</p>
  </div>
  <script>
    function launch() {
      document.body.style.background = 'linear-gradient(45deg, #ff00aa, #00ffff)';
      alert('🐼 PANDAFORGE ACTIVATED ON VERCEL PRODUCTION!\n\nRepo: github.com/kwizzlesurp10-ctrl/pandaforge-browser\n\nNext: Clone • Build • Dominate');
    }
    // Neon rain effect
    setInterval(() => {
      const rain = document.createElement('div');
      rain.textContent = '⚡';
      rain.style.position = 'absolute';
      rain.style.left = Math.random()*100 + 'vw';
      rain.style.top = '-20px';
      rain.style.color = '#00ffff';
      rain.style.fontSize = '20px';
      rain.style.transition = 'transform 1.5s linear, opacity 1.5s';
      document.body.appendChild(rain);
      setTimeout(() => {
        rain.style.transform = `translateY(${window.innerHeight + 100}px)`;
        rain.style.opacity = '0';
        setTimeout(() => rain.remove(), 1500);
      }, 50);
    }, 120);
  </script>
</body>
</html>
